name: Production
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ This workflow can only run on main branch!"
            exit 1
          fi

      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: create env
        run: |
          cat > .env.production << EOF
          VITE_API_URL_V1=${{ secrets.FRONTEND_USER_PROD_VITE_API_URL_V1 }}
          VITE_REVERB_APP_KEY=${{ secrets.FRONTEND_USER_PROD_VITE_REVERB_APP_KEY }}
          VITE_REVERB_HOST=${{ secrets.FRONTEND_USER_PROD_VITE_REVERB_HOST }}
          VITE_REVERB_PORT=${{ secrets.FRONTEND_USER_PROD_VITE_REVERB_PORT }}
          EOF

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.FRONTEND_PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.FRONTEND_PROD_AWS_SECRET_AC }}
          aws-region: ${{ secrets.FRONTEND_PROD_AWS_REGION }}

      - name: deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_PROD_S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_PROD_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: show URL
        run: |
          echo "Deployed to: http://${{ secrets.FRONTEND_PROD_S3_BUCKET }}.s3-website-${{ secrets.FRONTEND_PROD_AWS_REGION }}.amazonaws.com"
